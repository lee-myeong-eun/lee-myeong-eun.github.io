<!DOCTYPE html>
<html lang="en">
{% include head.html %}

<body>
  {% include navigation.html %} {% include header.html %}
  <!-- Page Content -->
  <div class="container mb-5 position-relative">
    {% if page.url contains '/assignments/' and page.url != '/assignments/' %}
    <!-- 상단 우측 닫기(Close) 버튼 -->
    <div class="text-right mt-4 mb-2">
      <a href="{{ site.baseurl }}/assignments/" class="btn btn-sm btn-outline-secondary shadow-sm" 
         style="font-weight: 600; border-radius: 6px; padding: 0.3rem 0.8rem;"
         title="과제 아카이브로 돌아가기">
        Close <i class="fa fa-times ml-1"></i>
      </a>
    </div>
    {% endif %}
    {{ content }}
  </div>
  <!-- /.container -->
  {% include footer.html %}

  <!-- Bootstrap core JavaScript -->
  <script src="{{ site.baseurl }}/assets/vendor/jquery/jquery.min.js"></script>
  <script src="{{ site.baseurl }}/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- Theme Toggle Script -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const themeBtns = document.querySelectorAll(".theme-btn");
      let currentTheme = localStorage.getItem("theme") || "dark";

      function applyTheme(theme) {
        // Remove all theme classes
        document.body.classList.remove("light-mode");
        
        // Add specific theme class if not dark
        if (theme === "light") {
          document.body.classList.add("light-mode");
        }
        
        // Update button active states
        themeBtns.forEach(btn => {
          if (btn.getAttribute("data-theme") === theme) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
        
        // Save to localStorage
        localStorage.setItem("theme", theme);
      }

      // Initial apply
      applyTheme(currentTheme);

      // Add click listeners to buttons
      themeBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          const theme = this.getAttribute("data-theme");
          applyTheme(theme);
        });
      });
    });
  </script>
</body>

</html>

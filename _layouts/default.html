<!DOCTYPE html>
<html lang="en">
{% include head.html %}

<body>
  {% include navigation.html %} {% include header.html %}
  <!-- Page Content -->
  <div class="container mb-5 position-relative">
    {% if page.url contains '/assignments/' and page.url != '/assignments/' %}
    <!-- 뒤로가기(Close) 플로팅 버튼 -->
    <a href="{{ site.baseurl }}/assignments/" class="btn btn-danger shadow-lg" 
       style="position: fixed; bottom: 40px; right: 40px; width: 60px; height: 60px; border-radius: 50%; font-size: 1.8rem; z-index: 9999; display: flex; align-items: center; justify-content: center; opacity: 0.85; transition: all 0.3s ease; color: white; border: none;"
       onmouseover="this.style.opacity='1'; this.style.transform='scale(1.1)';" 
       onmouseout="this.style.opacity='0.85'; this.style.transform='scale(1)';"
       title="과제 아카이브로 돌아가기">
      <i class="fa fa-times"></i>
    </a>
    {% endif %}
    {{ content }}
  </div>
  <!-- /.container -->
  {% include footer.html %}

  <!-- Bootstrap core JavaScript -->
  <script src="{{ site.baseurl }}/assets/vendor/jquery/jquery.min.js"></script>
  <script src="{{ site.baseurl }}/assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

  <!-- Theme Toggle Script -->
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const themeBtns = document.querySelectorAll(".theme-btn");
      let currentTheme = localStorage.getItem("theme") || "dark";

      function applyTheme(theme) {
        // Remove all theme classes
        document.body.classList.remove("light-mode");
        
        // Add specific theme class if not dark
        if (theme === "light") {
          document.body.classList.add("light-mode");
        }
        
        // Update button active states
        themeBtns.forEach(btn => {
          if (btn.getAttribute("data-theme") === theme) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
        });
        
        // Save to localStorage
        localStorage.setItem("theme", theme);
      }

      // Initial apply
      applyTheme(currentTheme);

      // Add click listeners to buttons
      themeBtns.forEach(btn => {
        btn.addEventListener("click", function() {
          const theme = this.getAttribute("data-theme");
          applyTheme(theme);
        });
      });
    });
  </script>
</body>

</html>

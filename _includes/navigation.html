<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <button
      class="navbar-toggler ml-auto"
      type="button"
      data-toggle="collapse"
      data-target="#navbarResponsive"
      aria-controls="navbarResponsive"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ml-auto">
        {% for item in site.data.menu %}
        <li class="nav-item{% if item.link == page.url %} active {% endif %}">
          <a class="nav-link" href="{{ site.baseurl }}{{ item.link }}">{{
            item.title
          }}</a>
        </li>
        {% endfor %}
        <li class="nav-item">
          <div class="btn-group btn-group-sm mt-1 ml-lg-3 theme-toggle-group" role="group" aria-label="Theme Toggle">
            <button type="button" class="btn btn-outline-light theme-btn" data-theme="light" title="라이트 모드">🌞</button>
            <button type="button" class="btn btn-outline-light theme-btn" data-theme="dark" title="다크 모드">🌙</button>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>

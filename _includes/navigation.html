<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <button
      class="navbar-toggler ml-auto"
      type="button"
      data-toggle="collapse"
      data-target="#navbarResponsive"
      aria-controls="navbarResponsive"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarResponsive">
      <ul class="navbar-nav ml-auto">
        {% for item in site.data.menu %}
        <li class="nav-item{% if item.link == page.url %} active {% endif %}">
          <a class="nav-link" href="{{ site.baseurl }}{{ item.link }}">{{
            item.title
          }}</a>
        </li>
        {% endfor %}
        <li class="nav-item">
          <button id="theme-toggle" class="btn btn-sm btn-outline-light mt-1 ml-lg-3" style="border-radius: 20px; padding: 0.2rem 0.8rem; border: 1px solid rgba(255,255,255,0.2);">
            <i class="fa fa-sun-o" id="theme-icon"></i>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

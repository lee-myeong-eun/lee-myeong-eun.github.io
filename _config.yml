title: Business Frontpage
description: A business home page starter template for Bootstrap 4 featuring marketing boxes and a full width image header.

# baseurl은 커스텀 도메인 아니면 비워두는 게 안전
baseurl: ""

# 메인 컬러 (HEX 추천)
color-scheme: "#2563eb"

# 🔥 핵심 수정 (이게 문제였던 부분)
sass:
  sass_dir: _sass
  style: compressed

include:
  - _pages

exclude:
  - .sass-cache
